name: nav2_mission_planner
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  font_awesome_flutter: ^10.6.0
  provider: ^6.1.1
  ros2_api:
    path: ./lib/plugins/ros2_api
  shared_preferences: ^2.5.3
  geometry_msgs:
    path: ./lib/plugins/geometry_msgs
  sensor_msgs:
    path: ./lib/plugins/sensor_msgs
  nav2_mission_planner_interfaces:
    path: ./lib/plugins/nav2_mission_planner_interfaces
  flutter_mjpeg: ^2.0.4
  ros2_msg_utils:
    path: ./lib/plugins/ros2_msg_utils
  nav_msgs:
    path: ./lib/plugins/nav_msgs
  image_gallery_saver:
    path: ./lib/plugins/image_gallery_saver-2.0.3
  permission_handler: ^12.0.0+1
  rosapi_msgs:
    path: ./lib/plugins/rosapi_msgs

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
